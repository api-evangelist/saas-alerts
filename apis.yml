apis:
  - aid: saas-alerts:saas-alerts
    name: SaaS Alerts API
    description: >-
      REST API (v0.20.0) providing programmatic access to the SaaS Alerts
      security monitoring platform. Enables MSP tools and SIEM/SOAR integrations
      to query security events, retrieve alerts, and access monitored user and
      customer data. Eight API methods including GET and POST operations for
      event querying and reporting. Authentication uses API keys generated in
      the management interface.
