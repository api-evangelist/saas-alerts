naftiko: "1.0.0-alpha1"

info:
  label: "SaaS Alerts API"
  description: "SaaS security monitoring platform API for MSPs providing access to security events, alerts, monitored users, and customer data across Microsoft 365, Google Workspace, Salesforce, Slack, and Dropbox."
  tags:
    - SaaS Alerts
    - SaaS Security
    - MSP
    - Threat Detection
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAAS_ALERTS_API_KEY: SAAS_ALERTS_API_KEY

capability:
  consumes:
    - type: http
      namespace: saas-alerts
      baseUri: https://api.saasalerts.com
      description: "SaaS Alerts REST API for MSP security monitoring"
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{SAAS_ALERTS_API_KEY}}"
        placement: header
      resources:
        - name: events
          path: /reports/events
          description: "Security events detected across monitored SaaS applications"
          operations:
            - name: list-security-events
              method: GET
              description: "List security events with optional filtering by type, severity, application, and date range"
              inputParameters:
                - name: eventType
                  in: query
                  type: string
                  required: false
                  description: "Filter by event type (e.g., login.failure, data.exfiltration)"
                - name: alertStatus
                  in: query
                  type: string
                  required: false
                  description: "Filter by severity: low, medium, or critical"
                - name: application
                  in: query
                  type: string
                  required: false
                  description: "Filter by SaaS application"
                - name: customerId
                  in: query
                  type: string
                  required: false
                  description: "Filter by customer identifier"
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date for filtering (ISO 8601)"
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date for filtering (ISO 8601)"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Results per page (max 100)"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: event-query
          path: /reports/event/query
          description: "Structured JSON query against SaaS Alerts event indexes"
          operations:
            - name: query-security-events
              method: POST
              description: "Execute structured query against SaaS Alerts event data with multiple filter conditions"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  eventTypes: "{{tools.eventTypes}}"
                  alertStatus: "{{tools.alertStatus}}"
                  startDate: "{{tools.startDate}}"
                  endDate: "{{tools.endDate}}"
                  customerIds: "{{tools.customerIds}}"
                  applications: "{{tools.applications}}"
        - name: alerts
          path: /reports/alerts
          description: "Security alerts generated by anomalous behavior detection"
          operations:
            - name: list-alerts
              method: GET
              description: "List active and historical security alerts"
              inputParameters:
                - name: alertStatus
                  in: query
                  type: string
                  required: false
                  description: "Filter by severity"
                - name: resolved
                  in: query
                  type: boolean
                  required: false
                  description: "Filter by resolution status"
                - name: customerId
                  in: query
                  type: string
                  required: false
                  description: "Filter by customer"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: customers
          path: /reports/customers
          description: "MSP customer tenants being monitored"
          operations:
            - name: list-customers
              method: GET
              description: "List all monitored MSP customer tenants"
              inputParameters:
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: users
          path: /reports/users
          description: "Users monitored across customer tenants"
          operations:
            - name: list-users
              method: GET
              description: "List monitored users with activity summary and risk indicators"
              inputParameters:
                - name: customerId
                  in: query
                  type: string
                  required: false
                  description: "Filter by customer"
                - name: application
                  in: query
                  type: string
                  required: false
                  description: "Filter by application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: saas-alerts-rest
      resources:
        - path: /v1/events
          name: events
          description: "Security event query and listing"
          operations:
            - method: GET
              name: list-security-events
              description: "List security events"
              call: "saas-alerts.list-security-events"
              with:
                eventType: "rest.eventType"
                alertStatus: "rest.alertStatus"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: query-security-events
              description: "Execute structured event query"
              call: "saas-alerts.query-security-events"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/alerts
          name: alerts
          description: "Security alerts"
          operations:
            - method: GET
              name: list-alerts
              description: "List security alerts"
              call: "saas-alerts.list-alerts"
              with:
                alertStatus: "rest.alertStatus"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers
          name: customers
          description: "Monitored customers"
          operations:
            - method: GET
              name: list-customers
              description: "List monitored customers"
              call: "saas-alerts.list-customers"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users
          name: users
          description: "Monitored users"
          operations:
            - method: GET
              name: list-users
              description: "List monitored users"
              call: "saas-alerts.list-users"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: saas-alerts-mcp
      transport: http
      tools:
        - name: list-security-events
          description: "List SaaS security events with filtering by type, severity, and application"
          hints:
            readOnly: true
            openWorld: false
          call: "saas-alerts.list-security-events"
          with:
            eventType: "tools.eventType"
            alertStatus: "tools.alertStatus"
            application: "tools.application"
          outputParameters:
            - type: object
              mapping: "$."
        - name: query-security-events
          description: "Execute a structured query against SaaS Alerts event indexes for complex filtering"
          hints:
            readOnly: true
            openWorld: false
          call: "saas-alerts.query-security-events"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-alerts
          description: "List active and historical security alerts across monitored customers"
          hints:
            readOnly: true
            openWorld: false
          call: "saas-alerts.list-alerts"
          with:
            alertStatus: "tools.alertStatus"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-customers
          description: "List all MSP customer tenants monitored by SaaS Alerts"
          hints:
            readOnly: true
            openWorld: false
          call: "saas-alerts.list-customers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: "List monitored users with activity summary and risk scores"
          hints:
            readOnly: true
            openWorld: false
          call: "saas-alerts.list-users"
          outputParameters:
            - type: object
              mapping: "$."
